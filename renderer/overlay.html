<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greta Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #667eea;
      --blue-glow: rgba(102, 126, 234, 0.5);
      --recording-color: #e53e3e;
      --processing-color: #ed8936;
      --bubble-bg: rgba(22, 33, 62, 0.95);
      --bubble-text: #e0e0e0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
    }

    /* -----------------------------------------------------------------------
       Companion dot — follows the cursor position sent from main.
       Uses absolute positioning updated by JavaScript.
    ----------------------------------------------------------------------- */
    #companion {
      position: fixed;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 12px var(--blue-glow), 0 0 4px var(--blue-glow);
      transform: translate(-50%, -50%);
      transition: left 0.05s linear, top 0.05s linear;
      opacity: 0;
      z-index: 1000;
      /* Point-to animation uses a longer transition set in JS */
    }

    #companion.visible { opacity: 1; }

    /* Pulsing ring around the dot when recording */
    #companion::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid var(--recording-color);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #companion.recording {
      background: var(--recording-color);
      box-shadow: 0 0 12px rgba(229, 62, 62, 0.6);
    }

    #companion.recording::after {
      opacity: 1;
      animation: pulse-ring 1s ease-out infinite;
    }

    #companion.processing {
      background: var(--processing-color);
      box-shadow: 0 0 12px rgba(237, 137, 54, 0.6);
      animation: orbit 1s linear infinite;
    }

    /* -----------------------------------------------------------------------
       Response bubble — appears near the companion dot
    ----------------------------------------------------------------------- */
    #response-bubble {
      position: fixed;
      max-width: 380px;
      min-width: 120px;
      background: var(--bubble-bg);
      color: var(--bubble-text);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(102, 126, 234, 0.2);
      opacity: 0;
      transform: scale(0.9) translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 999;
      pointer-events: none;
      word-break: break-word;
    }

    #response-bubble.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    /* Small triangle pointing toward the companion dot */
    #response-bubble::before {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 20px;
      width: 12px;
      height: 12px;
      background: var(--bubble-bg);
      transform: rotate(45deg);
      box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
    }

    /* Point label — small annotation that appears at a POINT target */
    .point-label {
      position: fixed;
      background: rgba(102, 126, 234, 0.9);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      transform: translate(-50%, -150%);
      opacity: 0;
      animation: label-fade 2.5s ease forwards;
      z-index: 1001;
      pointer-events: none;
    }

    /* -----------------------------------------------------------------------
       Waveform — subtle audio level visualiser during TTS playback
    ----------------------------------------------------------------------- */
    #waveform {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #waveform.visible { opacity: 1; }

    .wave-bar {
      width: 3px;
      background: var(--blue);
      border-radius: 2px;
      height: 4px;
      animation: wave 0.8s ease-in-out infinite;
    }

    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.2s; }

    /* -----------------------------------------------------------------------
       Animations
    ----------------------------------------------------------------------- */
    @keyframes pulse-ring {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    @keyframes orbit {
      from { transform: translate(-50%, -50%) rotate(0deg) translateX(4px) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg) translateX(4px) rotate(-360deg); }
    }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 18px; }
    }

    @keyframes label-fade {
      0%   { opacity: 0; transform: translate(-50%, -160%); }
      15%  { opacity: 1; transform: translate(-50%, -150%); }
      70%  { opacity: 1; transform: translate(-50%, -150%); }
      100% { opacity: 0; transform: translate(-50%, -160%); }
    }
  </style>
</head>
<body>
  <!-- Companion dot -->
  <div id="companion"></div>

  <!-- Response text bubble (above the companion dot) -->
  <div id="response-bubble"></div>

  <!-- Waveform bars shown during TTS playback -->
  <div id="waveform">
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
