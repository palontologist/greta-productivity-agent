<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #667eea;
      --blue-dark: #5a67d8;
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --text: #e0e0e0;
      --text-dim: #8892a4;
      --radius: 8px;
      --recording: #e53e3e;
      --processing: #ed8936;
      --responding: #48bb78;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* Make interactive elements non-draggable */
    button, input, select, a, .no-drag { -webkit-app-region: no-drag; }

    .panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 16px;
      gap: 12px;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--blue);
      transition: background 0.3s;
    }

    .logo-dot.recording { background: var(--recording); animation: pulse 1s infinite; }
    .logo-dot.processing { background: var(--processing); animation: spin 1s linear infinite; }
    .logo-dot.responding { background: var(--responding); }

    .logo-text { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }

    .turn-count { font-size: 11px; color: var(--text-dim); }

    /* ---- Status bar ---- */
    .status-bar {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-dim);
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-icon { font-size: 16px; }

    /* ---- PTT button ---- */
    .ptt-btn {
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px 0;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
    }

    .ptt-btn:hover { background: var(--blue-dark); }
    .ptt-btn:active { transform: scale(0.98); }
    .ptt-btn.recording { background: var(--recording); }
    .ptt-btn.processing { background: var(--processing); cursor: default; }
    .ptt-btn.responding { background: var(--responding); cursor: default; }

    .shortcut-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: -4px;
    }

    .shortcut-hint kbd {
      background: var(--surface2);
      color: var(--text);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
    }

    /* ---- Stats strip ---- */
    .stats-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 8px;
      text-align: center;
    }

    .stat-value { font-size: 18px; font-weight: 700; color: var(--blue); }
    .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ---- Settings section ---- */
    .settings { display: flex; flex-direction: column; gap: 8px; }

    .settings-row { display: flex; align-items: center; gap: 8px; }

    .settings-label { font-size: 11px; color: var(--text-dim); min-width: 80px; }

    .settings input[type="text"], .settings select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--surface2);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .settings input[type="text"]:focus, .settings select:focus {
      border-color: var(--blue);
    }

    .settings select option { background: var(--surface); }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border-radius: 18px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--blue); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(14px); }

    /* ---- Clear history button ---- */
    .clear-btn {
      background: transparent;
      border: 1px solid var(--surface2);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      width: 100%;
    }

    .clear-btn:hover { border-color: var(--recording); color: var(--recording); }

    /* ---- Animations ---- */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="logo">
        <div class="logo-dot" id="logo-dot"></div>
        <span class="logo-text">Greta</span>
      </div>
      <span class="turn-count no-drag" id="turn-count">0 turns</span>
    </div>

    <div class="status-bar" id="status-bar">
      <span class="status-icon">💤</span>
      <span id="status-text">Idle — press the button or shortcut to talk</span>
    </div>

    <div class="stats-strip no-drag" id="stats-strip">
      <div class="stat">
        <div class="stat-value" id="stat-activities">—</div>
        <div class="stat-label">Tracked</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-apps">—</div>
        <div class="stat-label">Apps</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-time">—</div>
        <div class="stat-label">Active</div>
      </div>
    </div>

    <button class="ptt-btn no-drag" id="ptt-btn" onclick="handlePTT()">
      🎙 Talk to Greta
    </button>

    <p class="shortcut-hint">
      or press <kbd id="shortcut-display">Ctrl+Shift+Space</kbd>
    </p>

    <div class="settings no-drag">
      <div class="settings-row">
        <span class="settings-label">Worker URL</span>
        <input
          type="text"
          id="worker-url"
          placeholder="http://localhost:8787"
          onchange="saveWorkerUrl(this.value)"
        />
      </div>

      <div class="settings-row">
        <span class="settings-label">Model</span>
        <select id="model-select" onchange="saveModel(this.value)">
          <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
          <option value="claude-opus-4-5">Claude Opus 4.5</option>
          <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
        </select>
      </div>

      <div class="settings-row">
        <span class="settings-label">Voice</span>
        <label class="toggle-wrap">
          <div class="toggle">
            <input type="checkbox" id="voice-toggle" onchange="saveVoice(this.checked)" checked />
            <span class="toggle-slider"></span>
          </div>
          <span style="font-size:12px;color:var(--text-dim)">ElevenLabs TTS</span>
        </label>
      </div>
    </div>

    <button class="clear-btn no-drag" onclick="clearHistory()">
      🗑 Clear conversation history
    </button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
